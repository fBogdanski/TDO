version: '3.9'

services:
  app:
    build: .
    container_name: app_service
    expose:
      - 8000
    volumes:
      - app_data:/data
    environment:
      - DB_PATH=/data/app.db
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    networks:
      - app_network

  nginx:
    image: nginx:alpine
    container_name: nginx_proxy
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - app_network

volumes:
  app_data:

networks:
  app_network:
